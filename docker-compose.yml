# AI Productivity Dashboard v3.0 — Docker Compose
#
# Usage:
#   docker compose up          # start in foreground
#   docker compose up -d       # start in background
#   docker compose down        # stop
#
# The dashboard auto-discovers your AI tool data from host mounts (read-only).
# Database is persisted in ./data/

version: '3.8'

services:
  dashboard:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "3030:3030"
    volumes:
      # AI tool data (read-only from host)
      - type: bind
        source: ${CLAUDE_DIR:-~/.claude}
        target: /root/.claude
        read_only: true
      - type: bind
        source: ${CURSOR_DIR:-~/.cursor}
        target: /root/.cursor
        read_only: true
        # Ignore if Cursor not installed
      - type: bind
        source: ${GEMINI_DIR:-~/.gemini}
        target: /root/.gemini
        read_only: true
      # Persistent database
      - ./data:/app/data
    environment:
      - PORT=3030
      - DB_PATH=/app/data/analytics.db
      - BIND=0.0.0.0   # required for Docker — container needs to accept external connections
      # Optional: set your LLM API key for Deep Analyze feature
      # - ANTHROPIC_API_KEY=
      # - OPENAI_API_KEY=
      # - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
