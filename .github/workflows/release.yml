name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-sea:
    name: Build SEA — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ai-dashboard-linux-x64
          - os: macos-latest
            artifact: ai-dashboard-macos-arm64
          - os: windows-latest
            artifact: ai-dashboard-win.exe

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps
        run: pnpm run build

      - name: Install build tools
        run: npm install -g postject esbuild

      - name: Build SEA
        run: node scripts/build-sea.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build-sea
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          path: dist/
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body: |
            ## OCD (Omni Coder Dashboard) ${{ github.ref_name }}

            ### Install via npm (recommended)

            ```bash
            npm install -g omni-coder-dashboard
            ocd
            ```

            Or run without installing:

            ```bash
            npx omni-coder-dashboard
            ```

            ### Install from GitHub Packages

            ```bash
            npm install -g @riko5652/ocd --registry=https://npm.pkg.github.com
            ```

            ### Standalone binaries (experimental)

            If available, download the binary for your platform below — no Node.js required.

            | Platform | File |
            |---------|------|
            | Linux (x64) | `ai-dashboard-linux-x64` |
            | macOS (Apple Silicon) | `ai-dashboard-macos-arm64` |
            | Windows | `ai-dashboard-win.exe` |

  publish-npm:
    name: Publish to npm
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps
        run: pnpm run build

      - name: Verify package
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    name: Publish to GitHub Packages
    needs: release
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@riko5652'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps
        run: pnpm run build

      - name: Configure package for GPR
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@riko5652/ocd';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
